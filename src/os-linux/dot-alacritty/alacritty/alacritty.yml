---
live_config_reload: true

shell:
  program: /bin/bash
  args:
    - '-l'
    - '-c'
    - 'tmux attach || tmux || bash'

font:
  size: 24.0
  builtin_box_drawing: true
  normal:
    family: JetBrains Mono Nerd Font
    style: Regular
  bold:
    family: JetBrains Mono Nerd Font
    style: Bold
  italic:
    family: JetBrains Mono Nerd Font
    style: Italic
  bold_italic:
    family: JetBrains Mono Nerd Font
    style: Bold Italic
  offset:
    x: 0
    y: 0
  glyph_offset:
    x: 0
    y: 0

window:
  opacity: 1.0
  dynamic_title: true
  padding:
    x: 5
    y: 5

mouse:
  hide_when_typing: true
