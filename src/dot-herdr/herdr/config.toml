onboarding = false


[terminal]
default_shell = "zsh"


[theme]
name = "terminal"


[keys]
prefix = "ctrl+a"
goto = "prefix+ctrl+p"

split_vertical   = "prefix+|"
split_horizontal = "prefix+-"
new_tab    = ["prefix+c", "prefix+ctrl+n"]
close_workspace = "prefix+shift+q"
switch_tab = "alt+1..9"
reload_config = "prefix+r"
resize_mode   = "prefix+shift+r"


[ui]
confirm_close = true
prompt_new_tab_name = false
show_agent_labels_on_pane_borders = true

pane_gaps = true

sidebar_width = 64
sidebar_min_width = 48
sidebar_max_width = 64
sidebar_collapsed_mode = "hidden"
hide_tab_bar_when_single_tab = false


[experimental]
pane_history = true
allow_nested = false

