---

name: shellcheck
run-name: shellcheck-${{ github.event.number }} ${{ github.event.pull_request.title }}
on:
  pull_request:
    branches: [ "**" ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run shellcheck
        run: |
          find src -type f -executable \
            -exec sh -c 'file -b "$1" | grep -qi "shell\|bash"' _ {} \; \
            -print0 \
            | xargs -0 --no-run-if-empty shellcheck
