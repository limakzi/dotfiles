---

- defaults:
    link:
      create: true
      relink: true
    create:
      mode: 0700


- create:
    - ~/desktop
    - ~/documents
    - ~/downloads
    - ~/music
    - ~/pictures
    - ~/public
    - ~/templates
    - ~/videos

- create:
    - ~/.config/

- link:
    ~/.config/bat: src/dot-bat/bat/
    ~/.config/fish: src/dot-fish/fish/
    ~/.config/git: src/dot-git/git/
    ~/.config/lsd: src/dot-lsd/lsd/
    ~/.config/nvim: src/dot-nvim/nvim/
    ~/.config/starship: src/dot-starship/starship/
    ~/.config/tmux: src/dot-tmux/tmux/
    ~/.config/zathura: src/dot-zathura/zathura/
