---

- defaults:
    link:
      create: true
      relink: true
    create:
      mode: 0700


- create:
    - ~/desktop
    - ~/documents
    - ~/downloads
    - ~/music
    - ~/pictures
    - ~/public
    - ~/templates
    - ~/videos

- create:
    - ~/.config/

- link:
    ~/.config/git: src/dot-git/git/
    ~/.config/nvim: src/dot-nvim/nvim/
    ~/.config/starship: src/dot-starship/starship/
